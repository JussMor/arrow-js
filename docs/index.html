<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      ;(function () {
        var colorScheme = window.matchMedia('(prefers-color-scheme: dark)')
        var favicon =
          document.querySelector('link[data-managed-favicon]') ||
          document.createElement('link')

        favicon.setAttribute('data-managed-favicon', 'true')
        favicon.rel = 'icon'
        favicon.type = 'image/png'

        if (!favicon.parentNode) {
          document.head.appendChild(favicon)
        }

        function syncFavicon() {
          var variant = colorScheme.matches ? 'dark' : 'light'
          favicon.href = '/favicon-' + variant + '.png?v=' + variant
        }

        try {
          var stored = localStorage.getItem('arrow-theme')
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored)
          } else if (!colorScheme.matches) {
            document.documentElement.setAttribute('data-theme', 'light')
          }
        } catch (e) {}

        syncFavicon()

        if (typeof colorScheme.addEventListener === 'function') {
          colorScheme.addEventListener('change', syncFavicon)
        } else if (typeof colorScheme.addListener === 'function') {
          colorScheme.addListener(syncFavicon)
        }
      })()
    </script>
    <!--app-head-->
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 antialiased">
    <div id="app"><!--app-html--></div>
    <!--app-payload-->
    <script type="module" src="/src/entry-client.ts"></script>
  </body>
</html>
